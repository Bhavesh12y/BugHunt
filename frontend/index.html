<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BugHunt | AI Automation</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  
  <nav class="navbar">
    <div class="nav-brand">
      <i data-lucide="scan-line"></i> BugHunt
    </div>
    <div class="nav-links">
      <a href="#">Features</a>
      <a href="#">Pricing</a>
      <a href="#">Docs</a>
    
    </div>
  </nav>

  <main class="landing-container">
    <!-- Hero Section -->
    <header class="hero">
      <h1>BugHunt: The Future of<br>AI-Powered QA Automation.</h1>
      <p>Launch, Analyze, and Debug with AI. Faster, smarter, and autonomous.</p>
    </header>

    <!-- Scanner Input Section -->
   <!-- Scanner Input Section -->
    <section class="scanner-section">
      <form id="qa-form" class="qa-form">
        <div class="url-bar">
          <i data-lucide="globe"></i>
          <input type="url" id="url" placeholder="https://your-site.com" required />
          <button type="submit" id="submit-btn">→</button>
        </div>
        
        <!-- RESTORED AUTHENTICATION FIELDS -->
        <div class="auth-bar">
          <div class="input-with-icon">
            <i data-lucide="user"></i>
            <input type="text" id="username" placeholder="Username / Email (Optional)" />
          </div>
          <div class="input-with-icon">
            <i data-lucide="lock"></i>
            <input type="password" id="password" placeholder="Password (Optional)" />
          </div>
        </div>

        <div class="options-bar">
          <textarea id="instructions" placeholder="Add custom instructions (e.g., 'Ignore contrast warnings on pink background', 'Focus on broken images')"></textarea>
          
          <select id="device" class="device-select">
            <option value="desktop">Desktop View</option>
            <option value="mobile">Mobile View</option>
          </select>
        </div>
      </form>
    </section>

    <!-- Results & Terminal Section -->
    <section class="results-section">
      <div id="loading-state" class="loading-state hidden">
        <div class="terminal-ui">
            <div class="terminal-header">
                <div class="terminal-dot red"></div>
                <div class="terminal-dot yellow"></div>
                <div class="terminal-dot green"></div>
                <span>VisionQA_Execution_Pipeline.exe</span>
            </div>
            <div id="live-logs-container" class="terminal-body"></div>
        </div>
      </div>

      <div id="empty-state" class="empty-state hidden">
        <i data-lucide="alert-triangle"></i>
        <h3 id="error-title">Analysis Failed</h3>
        <p id="error-message"></p>
      </div>

      <div id="results-data" class="results-data hidden">
        <div class="report-wrapper markdown-body" id="report-container">
            <!-- AI Report Injected Here -->
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
